<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="100%" stop-color="#12081f"/>
    </linearGradient>
    <linearGradient id="cardface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161c2c"/>
      <stop offset="100%" stop-color="#0d1120"/>
    </linearGradient>
    <linearGradient id="barfill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#39ff88"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="380" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="40" cy="40" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="90" r="1" ><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="810" cy="60" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="130" r="1" ><animate attributeName="opacity" values="1;0.3;1" dur="3.6s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="200" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="230" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="2.9s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="320" r="1"  ><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="330" r="1.5"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="30" r="1" ><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="20" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="3.4s" begin="0.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- title -->
  <text x="450" y="52" text-anchor="middle" font-size="34" font-weight="bold" fill="#39ff88" filter="url(#glow)">
    KUNAL AGRAWAL
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.6s" repeatCount="indefinite"/>
  </text>

  <!-- subtitle typewriter, word by word -->
  <text x="450" y="78" text-anchor="middle" font-size="13" fill="#8fb8ff" letter-spacing="1">
    <tspan opacity="0">AI</tspan><tspan opacity="0"> ENGINEER</tspan><tspan opacity="0"> //</tspan><tspan opacity="0"> OFFLINE-FIRST</tspan><tspan opacity="0"> RAG</tspan><tspan opacity="0"> +</tspan><tspan opacity="0"> AGENTIC</tspan><tspan opacity="0"> SYSTEMS</tspan>
  </text>
  <!-- reveal via separate overlay (broad-browser-safe approach: fade whole line in staggered chunks) -->
  <g font-size="13" fill="#8fb8ff" letter-spacing="1" text-anchor="middle">
    <text x="450" y="78" opacity="0">
      AI ENGINEER // OFFLINE-FIRST RAG + AGENTIC SYSTEMS
      <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.02;0.15;0.85;0.95;1" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- orbiting achievement badge -->
  <g>
    <g>
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#1b2333" stroke="#ffd166" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" font-size="9" fill="#ffd166" font-weight="bold">SIH</text>
      <animateMotion dur="9s" repeatCount="indefinite"
        path="M -220,0 A 220,58 0 1,0 220,0 A 220,58 0 1,0 -220,0" rotate="0"/>
    </g>
    <animateTransform attributeName="transform" type="translate" values="450,215" additive="sum"/>
  </g>

  <!-- flipping game card -->
  <g transform="translate(450,220)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1 1;0.04 1;1 1" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite"/>
      <g transform="translate(-450,-220)">

        <!-- shared card shell -->
        <rect x="270" y="150" width="360" height="140" rx="14" fill="url(#cardface)" stroke="#2a3550" stroke-width="2"/>
        <rect x="270" y="150" width="360" height="140" rx="14" fill="none" stroke="#39ff88" stroke-width="1" opacity="0.5"/>

        <!-- FRONT face -->
        <g>
          <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.49;0.5;0.99;1" dur="7s" repeatCount="indefinite"/>
          <text x="450" y="182" text-anchor="middle" font-size="11" fill="#5c6b8a" letter-spacing="2">CLASS</text>
          <text x="450" y="204" text-anchor="middle" font-size="19" fill="#39ff88" font-weight="bold">AI ENGINEER</text>
          <text x="450" y="230" text-anchor="middle" font-size="11" fill="#8fb8ff">B.Tech CS · IMS Engineering College · 2027</text>
          <text x="450" y="252" text-anchor="middle" font-size="11" fill="#ffd166">🏆 SIH 2025 National Finalist — top 300 / 50,000+</text>
          <text x="450" y="274" text-anchor="middle" font-size="10" fill="#5c6b8a">[ flip for objective ]</text>
        </g>

        <!-- BACK face -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.49;0.5;0.99;1" dur="7s" repeatCount="indefinite"/>
          <text x="450" y="180" text-anchor="middle" font-size="11" fill="#5c6b8a" letter-spacing="2">OBJECTIVE</text>
          <text x="450" y="202" text-anchor="middle" font-size="13" fill="#00d9ff">Offline-first RAG &amp; agentic systems</text>
          <text x="450" y="224" text-anchor="middle" font-size="12" fill="#e8ecf6">that stay grounded when the cloud can't help.</text>
          <text x="450" y="250" text-anchor="middle" font-size="12" fill="#39ff88" font-weight="bold">Open to: AI Engineer / GenAI / Agentic AI — 2027 batch</text>
          <text x="450" y="272" text-anchor="middle" font-size="10" fill="#5c6b8a">[ flip for player card ]</text>
        </g>

      </g>
    </g>
  </g>

  <!-- HUD loading bar -->
  <text x="270" y="322" font-size="10" fill="#5c6b8a" letter-spacing="1">GROUNDING</text>
  <rect x="270" y="330" width="360" height="14" rx="7" fill="#141a2a" stroke="#263047"/>
  <rect x="270" y="330" height="14" rx="7" fill="url(#barfill)">
    <animate attributeName="width" from="0" to="356" dur="2s" fill="freeze"/>
  </rect>
  <rect x="270" y="330" width="356" height="14" rx="7" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="2.4s" repeatCount="indefinite" begin="2s"/>
  </rect>
  <text x="630" y="322" text-anchor="end" font-size="10" fill="#39ff88" font-weight="bold">100%</text>

</svg>
