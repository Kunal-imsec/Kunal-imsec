<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="100%" stop-color="#0c0a1c"/>
    </linearGradient>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="580" fill="url(#bg2)"/>

  <!-- faint iso grid -->
  <g stroke="#1b2338" stroke-width="1" opacity="0.5">
    <path d="M0,140 L900,140 M0,220 L900,220 M0,300 L900,300 M0,380 L900,380 M0,460 L900,460"/>
  </g>

  <!-- header -->
  <text x="450" y="46" text-anchor="middle" font-size="30" font-weight="bold" fill="#39ff88" filter="url(#glow2)">SKILL TREE</text>
  <text x="450" y="68" text-anchor="middle" font-size="12" fill="#8fb8ff">unlocked via 600+ DSA problems &amp; real deployment nights</text>

  <rect x="380" y="82" width="140" height="22" rx="11" fill="#141a2a" stroke="#ffd166"/>
  <text x="450" y="97" text-anchor="middle" font-size="10" fill="#ffd166" font-weight="bold">LEVEL: FINAL YEAR</text>

  <!-- connectors: hub (450,300) to each node -->
  <g fill="none" stroke-width="2">
    <path id="c1" d="M450,300 L450,190" stroke="#ffd166" stroke-dasharray="6 6" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path id="c2" d="M450,300 L630,245" stroke="#39ff88" stroke-dasharray="6 6" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path id="c3" d="M450,300 L630,365" stroke="#00d9ff" stroke-dasharray="6 6" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <path id="c4" d="M450,300 L450,420" stroke="#ff6b6b" stroke-dasharray="6 6" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path id="c5" d="M450,300 L270,365" stroke="#a78bfa" stroke-dasharray="6 6" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.3s" repeatCount="indefinite"/>
    </path>
    <path id="c6" d="M450,300 L270,245" stroke="#f472b6" stroke-dasharray="6 6" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- traveling pulse dots -->
  <circle r="4" fill="#ffd166"><animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#c1"/></animateMotion></circle>
  <circle r="4" fill="#39ff88"><animateMotion dur="2.8s" repeatCount="indefinite"><mpath href="#c2"/></animateMotion></circle>
  <circle r="4" fill="#00d9ff"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#c3"/></animateMotion></circle>
  <circle r="4" fill="#ff6b6b"><animateMotion dur="3.0s" repeatCount="indefinite"><mpath href="#c4"/></animateMotion></circle>
  <circle r="4" fill="#a78bfa"><animateMotion dur="2.6s" repeatCount="indefinite"><mpath href="#c5"/></animateMotion></circle>
  <circle r="4" fill="#f472b6"><animateMotion dur="3.2s" repeatCount="indefinite"><mpath href="#c6"/></animateMotion></circle>

  <!-- rotating target-lock ring around hub -->
  <g transform="translate(450,300)">
    <circle r="66" fill="none" stroke="#39ff88" stroke-width="1.5" stroke-dasharray="8 10" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- HUB tile: AI ENGINEER -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" keyTimes="0;0.5;1" dur="3.2s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(450,300)">
      <polygon points="0,-50 85,-11 0,28 -85,-11" fill="#1a2035" stroke="#39ff88" stroke-width="2"/>
      <polygon points="-85,-11 0,28 0,50 -85,11" fill="#0f1526"/>
      <polygon points="0,28 85,-11 85,11 0,50" fill="#141b2c"/>
      <text x="0" y="4" text-anchor="middle" font-size="14" font-weight="bold" fill="#39ff88" filter="url(#glow2)">AI ENGINEER</text>
      <text x="0" y="20" text-anchor="middle" font-size="9" fill="#5c6b8a">core class</text>
    </g>
  </g>

  <!-- reusable node builder (hand-authored per node) -->

  <!-- LANG (top) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-9;0,0" keyTimes="0;0.5;1" dur="3.4s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(450,180)">
      <polygon points="0,-35 60,-8 0,19 -60,-8" fill="#3d3520" stroke="#ffd166" stroke-width="2"/>
      <polygon points="-60,-8 0,19 0,35 -60,8" fill="#2a2415"/>
      <polygon points="0,19 60,-8 60,8 0,35" fill="#332c1a"/>
      <text x="0" y="2" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffd166">LANG</text>
    </g>
    <text x="450" y="132" text-anchor="middle" font-size="9" fill="#c9c2a6">Python · JavaScript · Java</text>
  </g>

  <!-- ORCHESTRATION (upper right) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" keyTimes="0;0.5;1" dur="3.7s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(630,235)">
      <polygon points="0,-35 60,-8 0,19 -60,-8" fill="#123d2a" stroke="#39ff88" stroke-width="2"/>
      <polygon points="-60,-8 0,19 0,35 -60,8" fill="#0d2a1c"/>
      <polygon points="0,19 60,-8 60,8 0,35" fill="#0f3322"/>
      <text x="0" y="2" text-anchor="middle" font-size="10" font-weight="bold" fill="#39ff88">ORCHESTRATION</text>
    </g>
    <text x="630" y="187" text-anchor="middle" font-size="9" fill="#a6d9c2">LangChain · LangGraph · MCP · ReAct</text>
  </g>

  <!-- RETRIEVAL (lower right) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" keyTimes="0;0.5;1" dur="3.0s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(630,365)">
      <polygon points="0,-35 60,-8 0,19 -60,-8" fill="#0d333d" stroke="#00d9ff" stroke-width="2"/>
      <polygon points="-60,-8 0,19 0,35 -60,8" fill="#09242a"/>
      <polygon points="0,19 60,-8 60,8 0,35" fill="#0b2a33"/>
      <text x="0" y="2" text-anchor="middle" font-size="11" font-weight="bold" fill="#00d9ff">RETRIEVAL</text>
    </g>
    <text x="630" y="418" text-anchor="middle" font-size="9" fill="#a6d0d9">Qdrant · FAISS · BM25/RRF · Chroma</text>
  </g>

  <!-- INFERENCE (bottom) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" keyTimes="0;0.5;1" dur="3.9s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(450,420)">
      <polygon points="0,-35 60,-8 0,19 -60,-8" fill="#3d1616" stroke="#ff6b6b" stroke-width="2"/>
      <polygon points="-60,-8 0,19 0,35 -60,8" fill="#2a0f0f"/>
      <polygon points="0,19 60,-8 60,8 0,35" fill="#331212"/>
      <text x="0" y="2" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6b6b">INFERENCE</text>
    </g>
    <text x="450" y="473" text-anchor="middle" font-size="9" fill="#d9a6a6">Groq · OpenAI · Ollama · HF</text>
  </g>

  <!-- BACKEND (lower left) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" keyTimes="0;0.5;1" dur="3.5s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(270,365)">
      <polygon points="0,-35 60,-8 0,19 -60,-8" fill="#241d3d" stroke="#a78bfa" stroke-width="2"/>
      <polygon points="-60,-8 0,19 0,35 -60,8" fill="#18142a"/>
      <polygon points="0,19 60,-8 60,8 0,35" fill="#1d1833"/>
      <text x="0" y="2" text-anchor="middle" font-size="11" font-weight="bold" fill="#a78bfa">BACKEND</text>
    </g>
    <text x="270" y="418" text-anchor="middle" font-size="9" fill="#c6bce6">FastAPI · Django REST · Postgres · Mongo</text>
  </g>

  <!-- DEPLOY (upper left) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" keyTimes="0;0.5;1" dur="3.1s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(270,235)">
      <polygon points="0,-35 60,-8 0,19 -60,-8" fill="#3d1730" stroke="#f472b6" stroke-width="2"/>
      <polygon points="-60,-8 0,19 0,35 -60,8" fill="#2a1021"/>
      <polygon points="0,19 60,-8 60,8 0,35" fill="#331528"/>
      <text x="0" y="2" text-anchor="middle" font-size="11" font-weight="bold" fill="#f472b6">DEPLOY</text>
    </g>
    <text x="270" y="187" text-anchor="middle" font-size="9" fill="#e6b8d1">Git · Docker · Vercel · Render</text>
  </g>

  <!-- footer stat -->
  <text x="450" y="545" text-anchor="middle" font-size="11" fill="#5c6b8a">6 skill nodes online · 0 nodes idle · tree fully synced</text>

</svg>
